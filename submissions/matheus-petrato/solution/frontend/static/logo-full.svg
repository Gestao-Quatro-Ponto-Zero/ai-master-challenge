<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A840"/>
      <stop offset="100%" stop-color="#C4952A"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3048"/>
      <stop offset="100%" stop-color="#0C1923"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon background circle -->
  <circle cx="36" cy="36" r="34" fill="url(#navyGrad)"/>
  <circle cx="36" cy="36" r="34" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer ring tick marks -->
  <g stroke="#C4952A" stroke-width="1" opacity="0.4">
    <line x1="36" y1="4" x2="36" y2="9"/>
    <line x1="36" y1="63" x2="36" y2="68"/>
    <line x1="4" y1="36" x2="9" y2="36"/>
    <line x1="63" y1="36" x2="68" y2="36"/>
    <line x1="11.5" y1="11.5" x2="15" y2="15"/>
    <line x1="57" y1="57" x2="60.5" y2="60.5"/>
    <line x1="60.5" y1="11.5" x2="57" y2="15"/>
    <line x1="15" y1="57" x2="11.5" y2="60.5"/>
  </g>

  <!-- Inner decorative ring -->
  <circle cx="36" cy="36" r="22" fill="none" stroke="#C4952A" stroke-width="0.75" opacity="0.25"/>

  <!-- Compass rose - North/South diamond (gold) -->
  <path d="M36 14 L40 33 L36 30 L32 33 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
  <path d="M36 58 L32 39 L36 42 L40 39 Z" fill="#C4952A" opacity="0.5"/>

  <!-- Compass rose - East/West diamond (subtle) -->
  <path d="M58 36 L39 32 L42 36 L39 40 Z" fill="#C4952A" opacity="0.3"/>
  <path d="M14 36 L33 40 L30 36 L33 32 Z" fill="#C4952A" opacity="0.3"/>

  <!-- Center dot -->
  <circle cx="36" cy="36" r="3.5" fill="url(#goldGrad)"/>
  <circle cx="36" cy="36" r="1.5" fill="#0C1923"/>

  <!-- Cardinal letters -->
  <text x="36" y="12" text-anchor="middle" font-family="Georgia, serif" font-size="5" font-weight="700" fill="#C4952A" opacity="0.7">N</text>
  <text x="36" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="5" font-weight="700" fill="#C4952A" opacity="0.4">S</text>
  <text x="65" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="5" font-weight="700" fill="#C4952A" opacity="0.4">E</text>
  <text x="7" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="5" font-weight="700" fill="#C4952A" opacity="0.4">W</text>

  <!-- Wordmark -->
  <!-- G4 -->
  <text x="84" y="30" font-family="'Outfit', 'Arial Black', sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5" fill="url(#goldGrad)">G4</text>
  <!-- COMPASS -->
  <text x="84" y="50" font-family="'Outfit', 'Arial', sans-serif" font-size="16" font-weight="700" letter-spacing="3.5" fill="#FFFFFF">COMPASS</text>
  <!-- tagline -->
  <text x="86" y="63" font-family="'DM Sans', 'Arial', sans-serif" font-size="7.5" font-weight="400" letter-spacing="0.8" fill="#C4952A" opacity="0.85">Sales Co-Pilot</text>
</svg>
