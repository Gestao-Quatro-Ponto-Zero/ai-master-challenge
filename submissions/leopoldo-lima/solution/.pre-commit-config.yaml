repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies:
          - fastapi>=0.115.0
          - httpx>=0.27.0
          - pydantic>=2.0.0
          - pytest>=8.0.0
          - pytest-httpx>=0.35.0
        args: ["--explicit-package-bases", "src", "scripts", "tests"]
