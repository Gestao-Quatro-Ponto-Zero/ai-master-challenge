name: frontend-ci

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  ui-quality:
    name: UI Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-audit.txt

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run UI tests
        run: python scripts/tasks.py ui-tests

      - name: Run UI quality checks
        run: python scripts/tasks.py ui-quality
