name: ci-pr

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-audit.txt

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run lint
        run: python scripts/tasks.py lint

      - name: Run format check
        run: python scripts/tasks.py format

      - name: Run typecheck
        run: python scripts/tasks.py typecheck

      - name: Run tests
        run: python scripts/tasks.py test

      - name: Validate data contract
        run: python scripts/tasks.py contract

      - name: Validate dataset quality rules
        run: python scripts/tasks.py data-quality

      - name: Validate normalization layer
        run: python scripts/tasks.py normalization

      - name: Validate referential integrity
        run: python scripts/tasks.py referential-integrity

      - name: Run feature engineering smoke
        run: python scripts/tasks.py features

  security:
    name: Security and SBOM
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-audit.txt

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run dependency scan
        run: python scripts/tasks.py security

      - name: Generate SBOM
        run: python scripts/tasks.py sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/security/sbom.json
