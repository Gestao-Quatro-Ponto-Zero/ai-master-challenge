<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Scorer</title>
  <script src="vendor/tailwind.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    :root {
      --sh-card: 0 1px 3px 0 rgb(0 0 0 / .04), 0 1px 2px -1px rgb(0 0 0 / .04);
      --sh-card-h: 0 4px 6px -1px rgb(0 0 0 / .06), 0 2px 4px -2px rgb(0 0 0 / .04);
      --sh-drop: 0 10px 15px -3px rgb(0 0 0 / .08), 0 4px 6px -4px rgb(0 0 0 / .05);
    }
    .shadow-card { box-shadow: var(--sh-card); }
    .shadow-card-h { box-shadow: var(--sh-card-h); }
    .shadow-drop { box-shadow: var(--sh-drop); }
    .sec-expand { transition: max-height .3s cubic-bezier(.4,0,.2,1), opacity .25s ease; overflow: hidden; }
    /* Deal expand via native <details> — no JS state needed */
    details.deal > summary { list-style: none; cursor: pointer; }
    details.deal > summary::-webkit-details-marker { display: none; }
    details.deal > summary .deal-chevron { transition: transform .2s; }
    details.deal[open] > summary .deal-chevron { transform: rotate(90deg); }
    details.deal[open] > summary { background: var(--sec-bg); }
    details.deal[open] > .deal-body { background: var(--sec-bg); }
  </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans antialiased text-gray-900">

<div x-cloak x-data="leadScorer()" class="max-w-[1060px] mx-auto px-5 pt-8 pb-4">

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- HEADER CARD                                                -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="bg-white rounded-xl shadow-card border border-gray-200 px-6 py-5 mb-6">

    <div class="flex items-start justify-between mb-6">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Lead Scorer</h1>
        <p class="text-[13px] text-gray-500 mt-1">Priorize deals por retorno esperado</p>
      </div>
      <span class="text-[11px] text-gray-500 font-medium mt-1 bg-gray-100 px-2.5 py-1 rounded-md" x-text="snapshotLabel"></span>
    </div>

    <!-- Dropdown custom -->
    <div class="mb-5">
      <label class="block text-[11px] font-medium uppercase tracking-widest text-gray-500 mb-2">Ver pipeline de</label>
      <div @click.outside="dropOpen = false" class="relative max-w-sm">
        <button @click="dropOpen = !dropOpen"
          class="flex items-center justify-between w-full h-10 px-3.5 text-[13px] bg-white border rounded-lg transition-all"
          :class="dropOpen ? 'border-gray-400 ring-2 ring-gray-200 shadow-sm' : 'border-gray-300 hover:border-gray-400 hover:shadow-sm'">
          <span class="text-gray-900 font-medium" x-text="dropLabel"></span>
          <svg class="w-3.5 h-3.5 text-gray-400 ml-2 transition-transform duration-200" :class="dropOpen && 'rotate-180'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div x-show="dropOpen" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
             class="absolute top-full left-0 mt-1.5 w-full bg-white border border-gray-200 rounded-xl overflow-hidden z-50 max-h-[360px] overflow-y-auto shadow-drop">
          <template x-for="grp in dropGroups" :key="grp.label">
            <div>
              <div class="px-3 py-2 text-[10px] font-semibold text-gray-400 uppercase tracking-widest flex items-center gap-1.5 bg-gray-50 border-b border-gray-100 sticky top-0" x-text="grp.icon + ' ' + grp.label"></div>
              <template x-for="item in grp.items" :key="item.key">
                <button @click="selectedKey = item.key; dropOpen = false; recompute()"
                  class="w-full px-3 py-2 text-[13px] text-left flex items-center justify-between transition-colors"
                  :class="selectedKey === item.key ? 'bg-gray-50 text-gray-900' : 'text-gray-700 hover:bg-gray-50/60'">
                  <span class="flex items-center gap-2">
                    <svg x-show="selectedKey === item.key" class="w-3.5 h-3.5 text-gray-700 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                    <span x-show="selectedKey !== item.key" class="w-3.5 shrink-0"></span>
                    <span class="font-medium" x-text="item.name"></span>
                  </span>
                  <span class="text-[11px] text-gray-500 tabular-nums" x-text="item.detail"></span>
                </button>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Selected info -->
    <div class="mb-4 pb-4 border-b border-gray-200">
      <h2 class="text-base font-semibold text-gray-900" x-text="info.label"></h2>
      <p class="text-[13px] text-gray-500 mt-0.5" x-text="info.sub"></p>
    </div>

    <!-- Priority chips -->
    <div>
      <label class="block text-[11px] font-medium uppercase tracking-widest text-gray-500 mb-2">Prioridade</label>
      <div class="flex items-center gap-2 flex-wrap">
        <button @click="filterPriority = null"
          class="inline-flex items-center gap-2 h-8 px-3.5 rounded-lg text-[13px] font-medium border transition-all"
          :class="filterPriority === null ? 'border-gray-300 bg-gray-50 text-gray-900 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:text-gray-800 hover:border-gray-300'">
          <span class="font-semibold">Todas</span>
          <span class="text-[12px] text-gray-500 tabular-nums" x-text="totalFiltered"></span>
        </button>
        <template x-for="cat in categories" :key="cat.key">
          <button @click="filterPriority = (filterPriority === cat.key ? null : cat.key)"
            class="inline-flex items-center gap-2 h-8 px-3.5 rounded-lg text-[13px] font-medium border transition-all"
            :class="filterPriority === cat.key ? 'border-gray-300 bg-gray-50 text-gray-900 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:text-gray-800 hover:border-gray-300'">
            <span class="w-2 h-2 rounded-full shrink-0" :style="'background:' + cat.dotColor"></span>
            <span class="font-semibold text-gray-800" x-text="cat.short"></span>
            <span class="text-[12px] text-gray-500 tabular-nums" x-text="counts[cat.action] || 0"></span>
          </button>
        </template>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PRIORITY SECTIONS                                          -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="space-y-3">
    <template x-for="sec in visibleSections" :key="sec.key">
      <section :id="'sec-' + sec.key" class="bg-white rounded-xl border border-gray-200 overflow-hidden transition-shadow" :class="sections[sec.key] ? 'shadow-card-h' : 'shadow-card'">
        <!-- Section header -->
        <button @click="sections[sec.key] = !sections[sec.key]"
          class="w-full flex items-center gap-3.5 px-5 py-4 text-left transition-colors border-l-[3px]"
          :style="'border-left-color:' + sec.borderColor + ';' + (sections[sec.key] ? 'background:' + sec.bgColor : '')"
          :class="!sections[sec.key] && 'hover:bg-gray-50/60'">
          <svg class="w-4 h-4 text-gray-500 shrink-0 transition-transform duration-200" :class="sections[sec.key] && 'rotate-90'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          <span class="text-[15px]" x-text="sec.emoji"></span>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2">
              <h3 class="text-[14px] font-semibold text-gray-900" x-text="sec.label"></h3>
              <span class="text-[12px] text-gray-500" x-text="sec.deals.length + ' oportunidades'"></span>
            </div>
            <p class="text-[12px] text-gray-600 mt-0.5" x-text="sec.desc"></p>
          </div>
        </button>

        <!-- Expandable content -->
        <div class="sec-expand" :style="sections[sec.key] ? 'max-height:9999px;opacity:1' : 'max-height:0;opacity:0'">
          <div class="border-t border-gray-200">
            <!-- Table header -->
            <div class="flex items-center gap-6 px-5 py-2 text-[10px] font-medium uppercase tracking-widest text-gray-500 border-b border-gray-200 bg-gray-50/60">
              <div class="w-5 shrink-0"></div>
              <div class="flex-1 min-w-0">Conta</div>
              <div class="w-[120px]">Produto</div>
              <div x-show="info.type !== 'agent'" class="w-[90px] text-center">Vendedor</div>
              <div class="w-[70px] text-right">Chance</div>
              <div class="w-[90px] text-right">Valor</div>
              <div class="w-[100px] text-center">Relação</div>
              <div class="w-[90px] text-right">Aberto há</div>
            </div>

            <!-- Deal rows (native <details> for expand — no JS state bugs) -->
            <template x-for="(deal, idx) in sec.deals.slice(0, 20)" :key="deal.id">
              <details class="deal" :style="'--sec-bg:' + sec.bgColor">
                <summary class="flex items-center gap-6 px-5 py-2.5 hover:bg-gray-50/60 border-b border-gray-100">
                  <div class="w-5 shrink-0 flex justify-center">
                    <svg class="deal-chevron w-3.5 h-3.5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <span class="text-[13px] font-semibold text-gray-900 truncate block" x-text="deal.account || '—'"></span>
                  </div>
                  <div class="w-[120px]">
                    <span class="text-[13px] text-gray-800 truncate block" x-text="deal.product"></span>
                  </div>
                  <div x-show="info.type !== 'agent'" class="w-[90px]">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-medium bg-gray-100 text-gray-900 truncate max-w-full" x-text="deal.agent.split(' ')[0]"></span>
                  </div>
                  <div class="w-[70px] text-right">
                    <span class="text-[13px] font-semibold tabular-nums"
                      :class="deal.prob >= 0.65 ? 'text-emerald-600' : deal.prob >= 0.55 ? 'text-gray-800' : 'text-gray-500'"
                      x-text="fmtProb(deal.prob)"></span>
                  </div>
                  <div class="w-[90px] text-right">
                    <span class="text-[13px] font-semibold text-gray-900 tabular-nums" x-text="fmtMoney(deal.value)"></span>
                  </div>
                  <div class="w-[100px] flex justify-center">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-[10px] font-semibold uppercase tracking-wide whitespace-nowrap"
                      :class="deal.agent_sold_to_account ? 'text-blue-700 bg-blue-50' : 'text-amber-700 bg-amber-50'"
                      x-text="deal.agent_sold_to_account ? 'CLIENTE' : 'PROSPECT'"></span>
                  </div>
                  <div class="w-[90px] text-right">
                    <span class="text-[12px] tabular-nums text-gray-600" x-text="deal.days_open != null ? deal.days_open + ' dias' : 'Prospecção'"></span>
                  </div>
                </summary>
                <div class="deal-body px-5 py-4 border-b border-gray-200">
                  <div class="ml-11">
                    <p class="text-[13px] text-gray-800 italic leading-relaxed" x-text="deal.explanation"></p>
                    <div x-show="deal.account_ltv" class="mt-3 inline-flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-200 rounded-lg">
                      <span class="text-[11px] text-gray-500 uppercase tracking-wide font-medium">LTV da conta</span>
                      <span class="text-[13px] font-bold text-gray-900" x-text="fmtMoney(deal.account_ltv)"></span>
                    </div>
                  </div>
                </div>
              </details>
            </template>

            <!-- Overflow indicator -->
            <template x-if="sec.deals.length > 20">
              <div class="px-5 py-2.5 text-[12px] text-gray-500 text-center bg-gray-50/40 border-t border-gray-200">
                <span x-text="'+ ' + (sec.deals.length - 20) + ' oportunidades adicionais'"></span>
              </div>
            </template>
          </div>
        </div>
      </section>
    </template>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- ATRIBUIR CONTA                                         -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <template x-if="(filterPriority === null || filterPriority === 'assign') && assignGroups.length > 0">
      <div>
        <div class="border-t border-dashed border-gray-300 my-4"></div>
        <section id="sec-assign" class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-card">
          <button @click="sections.assign = !sections.assign"
            class="w-full flex items-center gap-3.5 px-5 py-4 text-left transition-colors border-l-[3px]"
            :style="'border-left-color:#9ca3af;' + (sections.assign ? 'background:#f9fafb' : '')"
            :class="!sections.assign && 'hover:bg-gray-50/60'">
            <svg class="w-4 h-4 text-gray-500 shrink-0 transition-transform duration-200" :class="sections.assign && 'rotate-90'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            <span class="text-[15px]">📋</span>
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline gap-2">
                <h3 class="text-[14px] font-semibold text-gray-900">Atribuir conta</h3>
                <span class="text-[12px] text-gray-500" x-text="(counts['Atribuir conta'] || 0) + ' oportunidades'"></span>
              </div>
              <p class="text-[12px] text-gray-600 mt-0.5">Sem conta no CRM. Atribuir antes de priorizar.</p>
            </div>
          </button>
          <div class="sec-expand" :style="sections.assign ? 'max-height:9999px;opacity:1' : 'max-height:0;opacity:0'">
            <div class="border-t border-gray-200">
              <template x-for="(g, idx) in assignGroups" :key="g.product">
                <div x-data="{ open: false }">
                  <div @click="open = !open"
                    class="flex items-center justify-between px-5 py-3 transition-colors hover:bg-gray-50/60 cursor-pointer"
                    :class="idx < assignGroups.length - 1 && !open && 'border-b border-gray-100'">
                    <div class="flex items-center gap-3">
                      <svg class="w-3.5 h-3.5 text-gray-400 shrink-0 transition-transform duration-200" :class="open && 'rotate-90'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                      <span class="text-[13px] font-medium text-gray-900" x-text="g.product"></span>
                      <span class="text-[11px] text-gray-500 tabular-nums" x-text="g.count + ' deals'"></span>
                    </div>
                    <span class="text-[12px] text-gray-500">potencial <span class="font-semibold text-gray-900 tabular-nums" x-text="fmtMoney(g.totalValue)"></span></span>
                  </div>
                  <div x-show="open" class="bg-gray-50 border-b border-gray-200">
                    <div class="flex items-center gap-6 px-5 pl-12 py-1.5 text-[10px] font-medium uppercase tracking-widest text-gray-500 border-b border-gray-100">
                      <div class="flex-1">Vendedor</div>
                      <div class="w-[90px] text-right">Valor</div>
                      <div class="w-[90px] text-right">Aberto há</div>
                    </div>
                    <template x-for="d in g.deals.slice(0, 15)" :key="d.id">
                      <div class="flex items-center gap-6 px-5 pl-12 py-2 border-b border-gray-100/60 text-[13px]">
                        <div class="flex-1 text-gray-800" x-text="d.agent"></div>
                        <div class="w-[90px] text-right font-semibold text-gray-900 tabular-nums" x-text="fmtMoney(d.value)"></div>
                        <div class="w-[90px] text-right text-gray-600 text-[12px] tabular-nums" x-text="d.days_open != null ? d.days_open + ' dias' : 'Prospecção'"></div>
                      </div>
                    </template>
                    <template x-if="g.deals.length > 15">
                      <div class="px-5 pl-12 py-2 text-[12px] text-gray-500 text-center">
                        <span x-text="'+ ' + (g.deals.length - 15) + ' deals adicionais'"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </section>
      </div>
    </template>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- FOOTER                                                     -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="pt-6 pb-8 text-center space-y-1">
    <p class="text-[11px] text-gray-500" x-text="metadata.total_open_deals + ' deals abertos · calibrado em ' + (8800 - metadata.total_open_deals) + ' deals históricos (Won/Lost)'"></p>
    <p class="text-[10px] text-gray-400">Lead Scorer · G4 AI Master Challenge · build-003</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- DATA + LOGIC + ALPINE                                      -->
<!-- ═══════════════════════════════════════════════════════════ -->
<script src="data.js"></script>
<script>
function leadScorer() {
  const D = window.DATA, meta = D.metadata;
  const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const snap = meta.snapshot_date.split('-');
  const snapshotLabel = 'snapshot · ' + snap[2] + ' ' + MONTHS[parseInt(snap[1])-1] + ' ' + snap[0];

  const C = {
    p1: { border: '#ef4444', bg: '#fef8f8', dot: '#ef4444' },
    p2: { border: '#f97316', bg: '#fffbf6', dot: '#f97316' },
    p3: { border: '#10b981', bg: '#f6fefa', dot: '#10b981' },
    p4: { border: '#f59e0b', bg: '#fffdf5', dot: '#f59e0b' },
  };

  const categories = [
    { key: 'p1', action: 'Foco da semana',  short: 'P1', dotColor: C.p1.dot },
    { key: 'p2', action: 'Foco secundário', short: 'P2', dotColor: C.p2.dot },
    { key: 'p3', action: 'Ganho rápido',    short: 'P3', dotColor: C.p3.dot },
    { key: 'p4', action: 'Repensar',        short: 'P4', dotColor: C.p4.dot },
    { key: 'assign', action: 'Atribuir conta', short: 'Outros', dotColor: '#9ca3af' },
  ];

  const sectionDefs = [
    { key: 'p1', action: 'Foco da semana',  label: 'P1 — Foco da semana',  desc: 'Melhor retorno esperado. Atacar esta semana.', emoji: '🎯', borderColor: C.p1.border, bgColor: C.p1.bg },
    { key: 'p2', action: 'Foco secundário', label: 'P2 — Foco secundário', desc: 'Deals grandes fora do top. Manter no radar.',   emoji: '💰', borderColor: C.p2.border, bgColor: C.p2.bg },
    { key: 'p3', action: 'Ganho rápido',    label: 'P3 — Ganho rápido',    desc: 'Alta chance de fechar. Valor menor — trabalhar em lote.', emoji: '⚡', borderColor: C.p3.border, bgColor: C.p3.bg },
    { key: 'p4', action: 'Repensar',        label: 'P4 — Repensar',        desc: 'Chance abaixo da média. Decidir se vale insistir.', emoji: '🤔', borderColor: C.p4.border, bgColor: C.p4.bg },
  ];

  return {
    metadata: meta, categories, snapshotLabel,
    selectedKey: 'agent:Darcel Schlecht',
    dropOpen: false, filterPriority: null,
    sections: { p1: true, p2: true, p3: false, p4: false, assign: false },
    info: {}, counts: {}, totalFiltered: 0,
    dropLabel: '', dropGroups: [],
    visibleSections: [], assignGroups: [],

    init() {
      this.buildDropGroups();
      this.$watch('selectedKey', () => this.recompute());
      this.$watch('filterPriority', () => this.updateVisible());
      this.recompute();
    },

    buildDropGroups() {
      this.dropGroups = [
        { icon: '🌐', label: 'Regionais', items: meta.regional_offices.map(r => ({ key: 'regional:'+r.name, name: r.name, detail: r.open_deals_count+' deals · '+r.agent_count+' vend.' })) },
        { icon: '👥', label: 'Times', items: meta.managers.map(m => ({ key: 'manager:'+m.name, name: m.name, detail: m.open_deals_count+' deals · '+m.agent_count+' vend.' })) },
        { icon: '👤', label: 'Vendedores', items: meta.agents.map(a => ({ key: 'agent:'+a.name, name: a.name, detail: a.open_deals_count+' deals' })) },
      ];
    },

    recompute() {
      const idx = this.selectedKey.indexOf(':');
      const type = this.selectedKey.substring(0, idx);
      const name = this.selectedKey.substring(idx + 1);
      let agents, info;
      if (type === 'agent') {
        const a = meta.agents.find(x => x.name === name);
        agents = new Set([name]); info = { label: name, sub: (a?a.open_deals_count:0)+' deals abertos', type };
      } else if (type === 'manager') {
        const m = meta.managers.find(x => x.name === name);
        agents = new Set(m.agents); info = { label: 'Time '+name, sub: m.agent_count+' vendedores · '+m.open_deals_count+' deals', type };
      } else {
        const r = meta.regional_offices.find(x => x.name === name);
        agents = new Set(r.agents); info = { label: 'Regional '+name, sub: r.manager_count+' times · '+r.agent_count+' vendedores · '+r.open_deals_count+' deals', type };
      }
      this.info = info;
      // dropLabel usa total (calculado abaixo) — NÃO extrair de info.sub via regex

      const byAction = {}, counts = {}; let total = 0;
      for (const d of D.deals) {
        if (!agents.has(d.agent)) continue;
        (byAction[d.action] = byAction[d.action] || []).push(d);
        counts[d.action] = (counts[d.action] || 0) + 1; total++;
      }
      this.counts = counts; this.totalFiltered = total;
      this.dropLabel = info.label + ' — ' + total + ' deals';

      const s = a => (a||[]).slice().sort((x,y) => y.ev - x.ev);
      this._allSections = sectionDefs.map(def => ({...def, deals: s(byAction[def.action])})).filter(sec => sec.deals.length > 0);

      const grp = {};
      for (const d of (byAction['Atribuir conta']||[])) {
        if (!grp[d.product]) grp[d.product] = {product:d.product,count:0,totalValue:0,deals:[]};
        grp[d.product].count++; grp[d.product].totalValue += d.value;
        grp[d.product].deals.push(d);
      }
      this.assignGroups = Object.values(grp).sort((a,b) => b.totalValue - a.totalValue);
      this.updateVisible();
    },

    updateVisible() {
      if (this.filterPriority === null) {
        this.visibleSections = this._allSections;
      } else if (this.filterPriority === 'assign') {
        this.visibleSections = [];
      } else {
        this.visibleSections = this._allSections.filter(s => s.key === this.filterPriority);
      }
    },

    fmtMoney(v) { return '$'+Math.round(v).toLocaleString('pt-BR'); },
    fmtProb(p) { return Math.round(p*100)+'%'; },
  };
}
</script>
<script src="vendor/alpine.min.js" defer></script>
</body>
</html>
