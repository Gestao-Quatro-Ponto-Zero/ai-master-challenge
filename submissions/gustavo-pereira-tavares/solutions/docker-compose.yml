version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_churn_analise
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/outputs
    volumes:
      - ./models:/app/models:ro
      - ./outputs:/app/outputs:ro
      - ./data:/app/data:ro
    command: uvicorn api_principal:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/saude"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: dashboard_churn_analise
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models:ro
      - ./outputs:/app/outputs:ro
      - ./data:/app/data:ro
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  models:
  outputs:
  data:

networks:
  default:
    name: churn_network
