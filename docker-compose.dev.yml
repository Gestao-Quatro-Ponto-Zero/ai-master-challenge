version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: g4_compass_db
    environment:
      POSTGRES_DB: compass
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass
    ports:
      - "5432:5432"
    volumes:
      - ./submissions/matheus-petrato/backend/scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./submissions/matheus-petrato/backend
    container_name: g4_compass_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://compass:compass@db:5432/compass?sslmode=disable
      - PORT=8080
      - MERCURY_API_KEY=${MERCURY_API_KEY}
      - MERCURY_MODEL=${MERCURY_MODEL:-mercury-2}
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: g4_compass_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./submissions/matheus-petrato/frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  postgres_data:
